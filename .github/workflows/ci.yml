name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Unit tests
        run: pnpm test

  playwright:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @praxis/web build

      - name: Install Playwright browsers
        run: pnpm --filter @praxis/web exec playwright install --with-deps chromium

      - name: E2E smoke
        run: pnpm test:e2e
        env:
          CI: true

  lighthouse:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @praxis/web build

      - name: Start preview server
        working-directory: apps/web
        run: pnpm preview --port 4173 --host 127.0.0.1 &

      - name: Wait for preview
        run: npx --yes wait-on http://127.0.0.1:4173 --timeout 120000

      - name: Lighthouse CI
        run: npx --yes @lhci/cli@0.14.0 autorun --collect.url=http://127.0.0.1:4173/